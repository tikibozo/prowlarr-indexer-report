name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Sync deps
        run: uv sync --all-extras --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q
