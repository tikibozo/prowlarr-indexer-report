name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  # Force Node 24 for any JS actions still pinned to Node 20.
  # Harmless for actions already on Node 24; remove once upstream catches up.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Trivy scan of published :latest
    runs-on: ubuntu-latest
    # Pre-publish scanning happens in release.yml. Here we re-scan the
    # already-published :latest on a schedule to catch CVEs that emerge
    # after the release.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy on published image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'
